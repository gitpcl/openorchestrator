name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --group dev --system -e .

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7

      - name: Install tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y tmux

      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Install dependencies
        run: uv pip install --group dev --system -e .

      - name: Run tests
        run: pytest -v --cov=src/open_orchestrator --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Combine coverage
        if: always()
        run: |
          coverage combine || true
          coverage report || true

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Surface vulnerabilities in CI logs without blocking merges until known
    # transitive CVEs are remediated (tracked separately).
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install project (lock audit target)
        run: uv pip install -e . --system

      - name: Run pip-audit
        run: uvx pip-audit --strict --vulnerability-service=osv
