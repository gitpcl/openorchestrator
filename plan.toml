[[tasks]]
id = "fix-fd-bug"
description = "Fix critical file descriptor bug in src/open_orchestrator/core/environment.py around line 257. The except block calls os.get_inheritable(fd) on an already-closed fd, causing OSError. Fix: track fd state with a boolean flag (fd_closed = False), set it True after os.close(fd) at line 254, and in the except block check the flag instead of calling os.get_inheritable(). Also add a unit test in tests/test_environment.py covering the exception path (e.g., mock os.replace to raise, verify tmp file is cleaned up and fd is not double-closed)."
ai_tool = "claude"
depends_on = []

